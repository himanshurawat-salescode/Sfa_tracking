name: SFA Tracking Report - Daily 7AM IST

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Calculate yesterday's date (n-1)
        id: dates
        run: |
          YESTERDAY=$(date -u -d "yesterday" '+%Y-%m-%d')
          echo "yesterday=$YESTERDAY" >> $GITHUB_OUTPUT
          echo "Running report for date: $YESTERDAY"

      - name: Call SFA Tracking API
        id: api_call
        run: |
          YESTERDAY="${{ steps.dates.outputs.yesterday }}"
          mkdir -p reports
          curl --silent --show-error \
            --location 'https://datastream.salescode.ai/schedules/run-with-param' \
            --header 'X-Tenant-ID: perfettisfai' \
            --header 'Content-Type: application/json' \
            --header 'Authorization: Bearer ${{ secrets.API_BEARER_TOKEN }}' \
            --data "{
              \"name\": \"sfa_tracking_report\",
              \"trigger\": \"dailyAt-5:00-ist\",
              \"filter\": {
                \"map\": {
                  \"startDate\": \"$YESTERDAY\",
                  \"endDate\": \"$YESTERDAY\"
                }
              }
            }" \
            --output reports/response-$YESTERDAY.json \
            --write-out "HTTP Status: %{http_code}\n"
          echo "Response saved to reports/response-$YESTERDAY.json"
          cat reports/response-$YESTERDAY.json

      - name: Upload API Response as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sfa-report-${{ steps.dates.outputs.yesterday }}
          path: reports/
          retention-days: 2
